<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Area — Hostara</title>
<style>
:root{--primary:#eab308;--primary-dark:#ca8a04;--bg:#0c0a00;--card:#1a1700;--border:#3a2e00;--text:#fefce8;--muted:#a39a5a;--success:#22c55e;--warning:#f97316;--error:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(12,10,0,.95);position:sticky;top:0;z-index:50;}
.logo{font-size:1.35rem;font-weight:800;color:var(--text);text-decoration:none;}
.logo em{color:var(--primary);font-style:normal;}
.nav-links{display:flex;gap:1.5rem;align-items:center;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.88rem;}
.nav-links a:hover{color:var(--text);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .9rem;border-radius:6px;font-size:.83rem;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--error);color:var(--error);}
.wrap{max-width:900px;margin:2.5rem auto;padding:0 1.5rem 4rem;}
.welcome{margin-bottom:2rem;}
.welcome h1{font-size:1.6rem;font-weight:800;margin-bottom:.3rem;}
.welcome p{color:var(--muted);font-size:.9rem;}
.section-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:1rem;margin-top:2rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
table{width:100%;border-collapse:collapse;}
th{padding:.7rem 1.25rem;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left;background:rgba(0,0,0,.2);}
td{padding:.85rem 1.25rem;font-size:.84rem;border-top:1px solid var(--border);}
.badge{display:inline-block;padding:.18rem .55rem;border-radius:999px;font-size:.7rem;font-weight:700;}
.badge-pending{background:#451a03;color:var(--warning);}
.badge-paid{background:#14532d;color:var(--success);}
.badge-cancelled{background:#1f2937;color:var(--muted);}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.9rem;}
.not-logged{text-align:center;padding:4rem 1rem;}
.not-logged h2{font-size:1.4rem;margin-bottom:.75rem;}
.not-logged p{color:var(--muted);margin-bottom:1.5rem;}
.btn-primary{display:inline-block;background:var(--primary);color:#000;padding:.65rem 1.5rem;border-radius:8px;font-weight:700;text-decoration:none;font-size:.9rem;}
.btn-primary:hover{background:var(--primary-dark);color:#fff;}
footer{border-top:1px solid var(--border);padding:1.5rem;text-align:center;color:var(--muted);font-size:.8rem;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">⭐ Hos<em>tara</em></a>
  <div class="nav-links">
    <a href="index.html">Plans</a>
    <button class="btn-logout" id="logout-btn" onclick="logout()" style="display:none">Sign Out</button>
  </div>
</nav>
<div class="wrap" id="main-content">
  <div id="not-logged" class="not-logged" style="display:none">
    <h2>You're not signed in</h2>
    <p>Please sign in to view your invoices and services.</p>
    <a href="login.html" class="btn-primary">Sign In</a>
  </div>
  <div id="logged-content" style="display:none">
    <div class="welcome">
      <h1>Welcome back 👋</h1>
      <p id="client-email-display"></p>
    </div>
    <div class="section-title">Your Invoices</div>
    <div class="card" id="invoices-card"></div>
  </div>
</div>
<footer>&copy; 2026 Hostara &middot; <a href="contact.html" style="color:var(--muted)">Support</a></footer>
<script>
const session=JSON.parse(localStorage.getItem("ht_client_session")||"null");
if(!session||!session.loggedIn){
  document.getElementById("not-logged").style.display="block";
} else {
  document.getElementById("logged-content").style.display="block";
  document.getElementById("logout-btn").style.display="block";
  document.getElementById("client-email-display").textContent=session.email;
  const orders=JSON.parse(localStorage.getItem("ht_orders")||"[]");
  const mine=orders.filter(o=>o.email.toLowerCase()===session.email.toLowerCase());
  const card=document.getElementById("invoices-card");
  if(!mine.length){
    card.innerHTML='<div class="empty">No invoices yet. <a href="index.html" style="color:var(--primary)">View plans</a></div>';
  } else {
    const badges={["Pending Payment"]:"badge-pending",Paid:"badge-paid",Cancelled:"badge-cancelled"};
    card.innerHTML='<table><thead><tr><th>Invoice</th><th>Plan</th><th>Billing</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>'+
      [...mine].reverse().map(o=>`<tr>
        <td style="font-weight:600">${o.id}</td>
        <td>${o.plan}</td>
        <td>${o.billing||"—"}</td>
        <td>$${o.amount}</td>
        <td>${o.date}</td>
        <td><span class="badge ${badges[o.status]||"badge-cancelled"}">${o.status}</span></td>
      </tr>`).join("")+"</tbody></table>";
  }
}
function logout(){localStorage.removeItem("ht_client_session");location.href="login.html";}
</script>
</body>
</html>
